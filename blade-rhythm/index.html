<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blade Rhythm | Martin Gerlach</title>
  <link rel="stylesheet" href="game.css">
  <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
  <a class="back-link" href="../index.html#projekter">Tilbage til portfolio</a>

  <main class="game-shell">
    <header class="game-header">
      <p class="eyebrow">JavaScript game</p>
      <h1 id="gameTitle">
        <img id="titleIcon" src="favicon.png" alt="">
        Blade Rhythm
      </h1>
      <p class="game-intro">Angrib, når fjenden rammer den grønne zone, og heal mellem angrebene.</p>
    </header>

    <section class="status-panel" aria-label="Spilstatus">
      <p id="healthDisplay">Health: 100</p>
      <p id="enemyHealth">Enemy: 100</p>
      <p id="levelDisplay">Difficulty: 1</p>
      <div id="hpContainer" aria-hidden="true">
        <div id="hpBar"></div>
      </div>
    </section>

    <section id="gameArea" aria-label="Kamparena">
      <p id="notification" aria-live="polite"></p>
      <img id="player" src="player.png" alt="Spillerens kriger">
      <img id="enemy" src="orc.png" alt="Fjendtlig kriger">
      <div id="hitZone" aria-hidden="true"></div>
      <p id="restartHint">Tryk R for at starte igen</p>
    </section>

    <p id="actionFeedback" aria-live="polite"></p>

    <div class="game-controls" aria-label="Spilkontroller">
      <button id="attackBtn" type="button">Attack <kbd>Space</kbd></button>
      <button id="healBtn" type="button">Heal <kbd>H</kbd></button>
      <button id="restartBtn" type="button">Restart <kbd>R</kbd></button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
